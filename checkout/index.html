<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boutique - transcription-ia</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 40px 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: white; text-align: center; margin-bottom: 50px; font-size: 2.5em; }
        .banner { background: rgba(255,255,255,0.1); color: white; padding: 20px; border-radius: 8px; margin-bottom: 30px; text-align: center; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .product-card { background: white; border-radius: 12px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); transition: transform 0.3s, box-shadow 0.3s; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 15px 50px rgba(0,0,0,0.3); }
        .product-name { font-size: 1.3em; font-weight: bold; color: #333; margin-bottom: 10px; }
        .product-description { color: #666; font-size: 0.95em; margin-bottom: 15px; line-height: 1.5; }
        .product-price { font-size: 1.8em; color: #667eea; font-weight: bold; margin-bottom: 20px; }
        .product-email { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; margin-bottom: 10px; font-size: 0.9em; }
        .buy-btn { width: 100%; padding: 12px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: opacity 0.3s; }
        .buy-btn:hover { opacity: 0.9; }
        .payment-status { text-align: center; font-size: 0.85em; margin-top: 10px; color: #666; }
        .footer { text-align: center; color: white; margin-top: 50px; font-size: 0.9em; }
        .admin-link { position: fixed; bottom: 20px; right: 20px; background: rgba(255,255,255,0.2); color: white; padding: 10px 15px; border-radius: 6px; text-decoration: none; font-size: 0.85em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛍️ Boutique</h1>
        
        <div class="banner">
            <p>✅ E-commerce en ligne — Accès immédiat après paiement</p>
        </div>
        
        <div class="products-grid" id="products"></div>
        
        <div class="footer">
            <p>Paiement sécurisé · Données privées · Support 24/7</p>
        </div>
    </div>

    <script>
        const PRODUCTS = [{"name": "PassCerfa — Démarche Guidée", "price": "19€", "desc": "Vos démarches admin pré-remplies par IA", "slug": "passcerfa-guidee"}, {"name": "PassCerfa — Dossier Complet", "price": "79€", "desc": "Dossier complexe monté A-Z par IA", "slug": "passcerfa-complet"}, {"name": "PassCerfa — Suivi Mensuel", "price": "15€/mois", "desc": "Suivi mensuel + alertes + relances", "slug": "passcerfa-suivi"}, {"name": "Agent Sans Coder — Starter", "price": "39€", "desc": "1er agent IA sans code", "slug": "agent-starter"}, {"name": "Agent Sans Coder — Pro", "price": "290€", "desc": "Agent custom complet", "slug": "agent-pro"}, {"name": "Transcription IA — Base", "price": "9€", "desc": "Audios/vidéos → texte", "slug": "transcription-base"}, {"name": "Transcription IA — Pro", "price": "49€", "desc": "Transcription illimitée", "slug": "transcription-pro"}, {"name": "Prof-IA — Enseignant", "price": "29€", "desc": "Assistant pédagogique local", "slug": "profia-enseignant"}, {"name": "Prof-IA — Établissement", "price": "149€", "desc": "Déploiement établissement", "slug": "profia-etablissement"}];
        
        function initProducts() {
            const container = document.getElementById('products');
            PRODUCTS.forEach((product, idx) => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <div class="product-name">${product.name}</div>
                    <div class="product-description">${product.desc}</div>
                    <div class="product-price">${product.price}</div>
                    <input type="email" class="product-email" placeholder="ton@email.fr" data-idx="${idx}">
                    <button class="buy-btn" onclick="handleBuy(${idx})">Acheter maintenant</button>
                    <div class="payment-status" id="status-${idx}"></div>
                `;
                container.appendChild(card);
            });
        }
        
        function handleBuy(idx) {
            const emailInput = document.querySelector(`input[data-idx="${idx}"]`);
            const email = emailInput.value.trim();
            const statusDiv = document.getElementById(`status-${idx}`);
            const product = PRODUCTS[idx];
            
            if (!email || !email.includes('@')) {
                statusDiv.textContent = '❌ Email invalide';
                statusDiv.style.color = '#dc3545';
                return;
            }
            
            statusDiv.textContent = '⏳ Redirection paiement...';
            
            // Capturer l'email
            fetch('/api/capture-email', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email, product: product.name })
            }).catch(() => {});
            
            // Redirection vers Systeme.io checkout
            setTimeout(() => {
                window.location.href = `https://franckdelmas00.systeme.io/checkout/${product.slug}`;
            }, 500);
        }
        
        initProducts();
    </script>
</body>
</html>
