<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boutique - transcription-ia</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 40px 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: white; text-align: center; margin-bottom: 50px; font-size: 2.5em; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .product-card { background: white; border-radius: 12px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); transition: transform 0.3s; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 15px 50px rgba(0,0,0,0.3); }
        .product-name { font-size: 1.3em; font-weight: bold; color: #333; margin-bottom: 10px; }
        .product-description { color: #666; font-size: 0.95em; margin-bottom: 15px; line-height: 1.5; }
        .product-price { font-size: 1.8em; color: #667eea; font-weight: bold; margin-bottom: 20px; }
        .product-email { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; margin-bottom: 10px; font-size: 0.9em; }
        .buy-btn { width: 100%; padding: 12px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .buy-btn:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛍️ Boutique</h1>
        <div class="products-grid" id="products"></div>
    </div>
    <script>
        const PRODUCTS = [{"name": "PassCerfa — Démarche Guidée", "price": "19€", "description": "Vos démarches admin pré-remplies par IA", "checkout_url": "https://franckdelmas00.systeme.io/checkout/passcerfa-guidee"}, {"name": "PassCerfa — Dossier Complet", "price": "79€", "description": "Dossier complexe monté A-Z par IA", "checkout_url": "https://franckdelmas00.systeme.io/checkout/passcerfa-complet"}, {"name": "PassCerfa — Suivi Mensuel", "price": "15€/mois", "description": "Suivi mensuel + alertes + relances", "checkout_url": "https://franckdelmas00.systeme.io/checkout/passcerfa-suivi"}, {"name": "Agent Sans Coder — Starter", "price": "39€", "description": "1er agent IA sans code", "checkout_url": "https://franckdelmas00.systeme.io/checkout/agent-starter"}, {"name": "Agent Sans Coder — Pro", "price": "290€", "description": "Agent custom complet", "checkout_url": "https://franckdelmas00.systeme.io/checkout/agent-pro"}, {"name": "Transcription IA — Base", "price": "9€", "description": "Audios/vidéos → texte", "checkout_url": "https://franckdelmas00.systeme.io/checkout/transcription-base"}, {"name": "Transcription IA — Pro", "price": "49€", "description": "Transcription illimitée", "checkout_url": "https://franckdelmas00.systeme.io/checkout/transcription-pro"}, {"name": "Prof-IA — Enseignant", "price": "29€", "description": "Assistant pédagogique local", "checkout_url": "https://franckdelmas00.systeme.io/checkout/profia-enseignant"}, {"name": "Prof-IA — Établissement", "price": "149€", "description": "Déploiement établissement", "checkout_url": "https://franckdelmas00.systeme.io/checkout/profia-etablissement"}];
        function initProducts() {
            const container = document.getElementById('products');
            PRODUCTS.forEach((product, idx) => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <div class="product-name">${product.name}</div>
                    <div class="product-description">${product.description}</div>
                    <div class="product-price">${product.price}</div>
                    <input type="email" class="product-email" placeholder="ton@email.fr" data-idx="${idx}">
                    <button class="buy-btn" onclick="handleBuy(${idx})">Acheter</button>
                `;
                container.appendChild(card);
            });
        }
        function handleBuy(idx) {
            const emailInput = document.querySelector(`input[data-idx="${idx}"]`);
            const email = emailInput.value.trim();
            const product = PRODUCTS[idx];
            if (!email || !email.includes('@')) {
                alert('Email invalide');
                return;
            }
            window.location.href = product.checkout_url;
        }
        initProducts();
    </script>
</body>
</html>
